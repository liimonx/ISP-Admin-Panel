version: '3.8'

services:
  # Database - PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: isp_admin_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-isp_admin}
      POSTGRES_USER: ${POSTGRES_USER:-isp_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-isp_admin} -d ${POSTGRES_DB:-isp_admin}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: isp_admin_redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Django Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: isp_admin_backend:latest
    container_name: isp_admin_backend
    env_file: .env.prod
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-isp_admin}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-isp_admin}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - DJANGO_SETTINGS_MODULE=isp_admin.settings
      - DEBUG=False
    volumes:
      - ./backend/media:/app/media
      - ./backend/staticfiles:/app/staticfiles
      - ./backend/logs:/app/logs
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        python manage.py migrate &&
        python manage.py collectstatic --noinput &&
        gunicorn isp_admin.wsgi:application --bind 0.0.0.0:8000 --workers 4 --worker-class sync --timeout 60 --access-logfile - --error-logfile -
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # Celery Worker
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: isp_admin_backend:latest
    container_name: isp_admin_celery_worker
    env_file: .env.prod
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-isp_admin}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-isp_admin}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - DJANGO_SETTINGS_MODULE=isp_admin.settings
      - DEBUG=False
    volumes:
      - ./backend/media:/app/media
      - ./backend/logs:/app/logs
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A isp_admin worker --loglevel=info --concurrency=4 --max-tasks-per-child=1000
    networks:
      - app_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # Celery Beat (Scheduler)
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: isp_admin_backend:latest
    container_name: isp_admin_celery_beat
    env_file: .env.prod
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-isp_admin}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-isp_admin}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - DJANGO_SETTINGS_MODULE=isp_admin.settings
      - DEBUG=False
    volumes:
      - ./backend/logs:/app/logs
      - celery_beat_schedule:/app/celery_schedule
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A isp_admin beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    networks:
      - app_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # Frontend (React)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: isp_admin_frontend:latest
    container_name: isp_admin_frontend
    restart: always
    networks:
      - app_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: isp_admin_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./backend/staticfiles:/app/staticfiles:ro
      - ./backend/media:/app/media:ro
      - nginx_cache:/var/cache/nginx
    restart: always
    depends_on:
      - backend
      - frontend
    networks:
      - app_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  redis_data:
  celery_beat_schedule:
  nginx_cache:

networks:
  app_network:
    driver: bridge
