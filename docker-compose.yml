# version: '3.8'  # Removed obsolete version attribute

services:
  # PostgreSQL Database
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-isp_admin}
      POSTGRES_USER: ${POSTGRES_USER:-isp_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-isp_admin_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - isp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and Celery broker
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - isp-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - SECRET_KEY=${SECRET_KEY:-very-secure-test-key-for-development-only}
      - DEBUG=${DEBUG:-True}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-isp_admin}:${POSTGRES_PASSWORD:-isp_admin_password}@db:5432/${POSTGRES_DB:-isp_admin}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - DJANGO_SUPERUSER_USERNAME=${DJANGO_SUPERUSER_USERNAME:-superadmin}
      - DJANGO_SUPERUSER_EMAIL=${DJANGO_SUPERUSER_EMAIL:-superadmin@isp.com}
      - DJANGO_SUPERUSER_PASSWORD=${DJANGO_SUPERUSER_PASSWORD:-superadmin123!}
      - MAIN_ROUTER_IP=${MAIN_ROUTER_IP:-103.115.252.60}
      - MAIN_ROUTER_API_PORT=${MAIN_ROUTER_API_PORT:-8728}
      - MAIN_ROUTER_SSH_PORT=${MAIN_ROUTER_SSH_PORT:-22}
      - MAIN_ROUTER_USERNAME=${MAIN_ROUTER_USERNAME:-admin}
      - MAIN_ROUTER_PASSWORD=${MAIN_ROUTER_PASSWORD:-your_router_password}
      - MAIN_ROUTER_USE_TLS=${MAIN_ROUTER_USE_TLS:-True}
      - ROUTER_API_TIMEOUT=${ROUTER_API_TIMEOUT:-30}
      - ROUTER_CONNECTION_RETRIES=${ROUTER_CONNECTION_RETRIES:-3}
      - ROUTER_HEALTH_CHECK_INTERVAL=${ROUTER_HEALTH_CHECK_INTERVAL:-300}
      - USE_POSTGRES=${USE_POSTGRES:-true}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    networks:
      - isp-network
    # command: python manage.py runserver 0.0.0.0:8000

  # Celery Worker
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A isp_admin worker --loglevel=info --concurrency=4
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-isp_admin}:${POSTGRES_PASSWORD:-isp_admin_password}@db:5432/${POSTGRES_DB:-isp_admin}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - MAIN_ROUTER_IP=${MAIN_ROUTER_IP:-103.115.252.60}
      - MAIN_ROUTER_API_PORT=${MAIN_ROUTER_API_PORT:-8728}
      - MAIN_ROUTER_SSH_PORT=${MAIN_ROUTER_SSH_PORT:-22}
      - MAIN_ROUTER_USERNAME=${MAIN_ROUTER_USERNAME:-admin}
      - MAIN_ROUTER_PASSWORD=${MAIN_ROUTER_PASSWORD:-your_router_password}
      - MAIN_ROUTER_USE_TLS=${MAIN_ROUTER_USE_TLS:-True}
      - ROUTER_API_TIMEOUT=${ROUTER_API_TIMEOUT:-30}
      - ROUTER_CONNECTION_RETRIES=${ROUTER_CONNECTION_RETRIES:-3}
      - ROUTER_HEALTH_CHECK_INTERVAL=${ROUTER_HEALTH_CHECK_INTERVAL:-300}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - isp-network

  # React Frontend (Development mode with Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    networks:
      - isp-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - backend
      - frontend
    networks:
      - isp-network

# Networks
networks:
  isp-network:
    driver: bridge

# Volumes
volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume: