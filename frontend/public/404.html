<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>ISP Admin Panel</title>
    <script type="text/javascript">
      // Simple 404 fallback for GitHub Pages SPA
      // This will redirect to index.html with the original path
      var segmentCount = 1; // The part after the domain, e.g. /ISP-Admin-Panel/
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + segmentCount)
            .join("/") +
          "/index.html",
      );
    </script>
  </head>
  <body></body>
</html>
