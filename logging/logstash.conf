input {
  tcp {
    port => 5000
    codec => json
  }
  
  beats {
    port => 5044
  }
}

filter {
  if [type] == "django" {
    grok {
      match => { "message" => "%{TIMESTAMP_ISO8601:timestamp} %{LOGLEVEL:level} %{DATA:module} %{INT:process:int} %{INT:thread:int} %{GREEDYDATA:message}" }
    }
  }
  
  if [type] == "nginx" {
    grok {
      match => { "message" => "%{COMBINEDAPACHELOG}" }
    }
  }
  
  # Add GeoIP information for nginx logs
  if [type] == "nginx" {
    geoip {
      source => "clientip"
      target => "geoip"
    }
  }
  
  # Parse stack traces
  multiline {
    pattern => "^%{TIMESTAMP_ISO8601}"
    negate => true
    what => "previous"
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "logs-%{+YYYY.MM.dd}"
    document_type => "_doc"
  }
  
  # Also output to stdout for debugging
  stdout {
    codec => rubydebug
  }
}
